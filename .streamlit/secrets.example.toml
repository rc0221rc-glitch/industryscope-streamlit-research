# Copy these values into Streamlit Community Cloud:
# App -> Settings -> Secrets

# Optional caption suffix shown after the page subtitle.
CAPTION_SUFFIX = ""

# Provider keys. Fill only the providers you use.
OPENAI_API_KEY = ""
DEEPSEEK_API_KEY = ""
QWEAPI_AUTH_TOKEN = ""
ANTHROPIC_AUTH_TOKEN = ""
OPENAI_COMPAT_API_KEY = ""

# Optional provider defaults.
QWEAPI_BASE_URL = "https://qweapi.com"
QWEAPI_MODEL = "claude-opus-4-8"
QWEAPI_MODEL_DEEP = "claude-opus-4-8[1M]"
DEEPSEEK_BASE_URL = "https://api.deepseek.com"
OPENAI_COMPAT_BASE_URL = ""
OPENAI_COMPAT_MODEL = ""

# Optional persistent knowledge-base snapshot storage.
# Cloudflare R2 is S3-compatible. Leave blank to use manual ZIP backup only.
INDUSTRYSCOPE_KB_S3_BUCKET = ""
INDUSTRYSCOPE_KB_S3_KEY = "industryscope/kb_snapshot.zip"
INDUSTRYSCOPE_KB_S3_ENDPOINT_URL = "" # e.g. https://<account-id>.r2.cloudflarestorage.com
INDUSTRYSCOPE_KB_S3_REGION = "auto"
INDUSTRYSCOPE_KB_S3_ACCESS_KEY_ID = ""
INDUSTRYSCOPE_KB_S3_SECRET_ACCESS_KEY = ""
